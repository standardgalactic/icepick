<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Physics</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #171b22;
      --line: #2a313d;
      --text: #e8edf5;
      --muted: #9aa6b2;
      --accent: #7cc7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 18px;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
    }
    .controls {
      padding: 16px;
    }
    .row {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .value {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-size: 0.95rem;
      margin-top: 4px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button {
      border: 1px solid var(--line);
      background: #222934;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary {
      background: var(--accent);
      color: #081019;
      border: none;
    }
    .sim {
      padding: 14px;
    }
    canvas {
      width: 100%;
      display: block;
      border-radius: 14px;
      background: linear-gradient(180deg, #111723 0%, #0b0f17 100%);
      border: 1px solid var(--line);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .stat {
      background: #11161d;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }
    .stat-title {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Projectile Motion</h1>
    <div class="subtitle">A minimal interactive experiment for launch angle, speed, and gravity.</div>
    <div class="layout">
      <div class="card controls">
        <div class="row">
          <label for="angle">Launch angle</label>
          <input id="angle" type="range" min="5" max="85" step="1" value="45" />
          <div class="value" id="angleVal">45°</div>
        </div>
        <div class="row">
          <label for="speed">Initial speed</label>
          <input id="speed" type="range" min="5" max="50" step="1" value="24" />
          <div class="value" id="speedVal">24 m/s</div>
        </div>
        <div class="row">
          <label for="gravity">Gravity</label>
          <input id="gravity" type="range" min="1" max="20" step="0.1" value="9.8" />
          <div class="value" id="gravityVal">9.8 m/s²</div>
        </div>
        <div class="buttons">
          <button class="primary" id="launchBtn">Launch</button>
          <button id="resetBtn">Reset</button>
        </div>
      </div>
      <div class="card sim">
        <canvas id="canvas" width="760" height="460"></canvas>
        <div class="stats">
          <div class="stat">
            <div class="stat-title">Time</div>
            <div class="stat-value" id="timeStat">0.00 s</div>
          </div>
          <div class="stat">
            <div class="stat-title">Height</div>
            <div class="stat-value" id="heightStat">0.00 m</div>
          </div>
          <div class="stat">
            <div class="stat-title">Range</div>
            <div class="stat-value" id="rangeStat">0.00 m</div>
          </div>
        </div>
      </div>
    </div>
  </div>  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const angle = document.getElementById('angle');
    const speed = document.getElementById('speed');
    const gravity = document.getElementById('gravity');

    const angleVal = document.getElementById('angleVal');
    const speedVal = document.getElementById('speedVal');
    const gravityVal = document.getElementById('gravityVal');

    const timeStat = document.getElementById('timeStat');
    const heightStat = document.getElementById('heightStat');
    const rangeStat = document.getElementById('rangeStat');

    const state = {
      running: false,
      t: 0,
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      trail: [],
      lastTs: null
    };

    function updateLabels() {
      angleVal.textContent = `${angle.value}°`;
      speedVal.textContent = `${speed.value} m/s`;
      gravityVal.textContent = `${gravity.value} m/s²`;
    }

    function resetSim() {
      state.running = false;
      state.t = 0;
      state.x = 0;
      state.y = 0;
      state.vx = 0;
      state.vy = 0;
      state.trail = [];
      state.lastTs = null;
      updateStats();
      draw();
    }

    function launch() {
      const a = Number(angle.value) * Math.PI / 180;
      const v = Number(speed.value);
      state.running = true;
      state.t = 0;
      state.x = 0;
      state.y = 0;
      state.vx = v * Math.cos(a);
      state.vy = v * Math.sin(a);
      state.trail = [{ x: 0, y: 0 }];
      state.lastTs = null;
    }

    function updateStats() {
      timeStat.textContent = `${state.t.toFixed(2)} s`;
      heightStat.textContent = `${Math.max(0, state.y).toFixed(2)} m`;
      rangeStat.textContent = `${state.x.toFixed(2)} m`;
    }

    function drawAxes(scale, groundY, margin) {
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(margin, groundY);
      ctx.lineTo(canvas.width - margin, groundY);
      ctx.moveTo(margin, groundY);
      ctx.lineTo(margin, margin);
      ctx.stroke();

      ctx.fillStyle = '#7b8794';
      ctx.font = '12px Inter, sans-serif';
      ctx.fillText('x', canvas.width - margin + 8, groundY + 4);
      ctx.fillText('y', margin - 10, margin - 8);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const margin = 36;
      const groundY = canvas.height - 42;
      const maxRangeEstimate = Math.max(20, (Number(speed.value) ** 2) / Math.max(1, Number(gravity.value)) * 1.2);
      const scale = (canvas.width - margin * 2) / maxRangeEstimate;

      drawAxes(scale, groundY, margin);

      if (state.trail.length > 1) {
        ctx.strokeStyle = '#7cc7ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < state.trail.length; i++) {
          const px = margin + state.trail[i].x * scale;
          const py = groundY - state.trail[i].y * scale;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }

      const ballX = margin + state.x * scale;
      const ballY = groundY - state.y * scale;
      ctx.fillStyle = '#e8edf5';
      ctx.beginPath();
      ctx.arc(ballX, ballY, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#9aa6b2';
      ctx.font = '13px Inter, sans-serif';
      ctx.fillText('launch point', margin - 12, groundY + 22);
    }

    function animate(ts) {
      if (state.running) {
        if (state.lastTs == null) state.lastTs = ts;
        const dt = Math.min((ts - state.lastTs) / 1000, 0.03);
        state.lastTs = ts;

        const g = Number(gravity.value);
        state.t += dt;
        state.x += state.vx * dt;
        state.y += state.vy * dt;
        state.vy -= g * dt;

        if (state.y <= 0 && state.t > 0.02) {
          state.y = 0;
          state.running = false;
        } else {
          state.trail.push({ x: state.x, y: state.y });
        }

        updateStats();
      }

      draw();
      requestAnimationFrame(animate);
    }

    [angle, speed, gravity].forEach(el => el.addEventListener('input', () => {
      updateLabels();
      if (!state.running) draw();
    }));

    document.getElementById('launchBtn').addEventListener('click', launch);
    document.getElementById('resetBtn').addEventListener('click', resetSim);

    updateLabels();
    resetSim();
    requestAnimationFrame(animate);
  </script></body>
</html>
