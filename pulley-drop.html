<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulley Drop Comparison</title>
  <style>
    :root { --bg:#0b1020; --panel:#121a31; --panel-2:#182240; --text:#edf2ff; --muted:#aeb8d8; --accent:#7cc7ff; --accent-2:#ffb86b; --good:#7df0a7; --line:#2d3963; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at top,#172244 0%,var(--bg) 55%);color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    h1{margin:0 0 10px;font-size:clamp(1.8rem,2.8vw,3rem)}
    .subtitle{color:var(--muted);max-width:900px;margin-bottom:20px}
    .layout{display:grid;grid-template-columns:360px 1fr;gap:18px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:20px}
    .controls{padding:18px;position:sticky;top:16px}
    .section-title{font-weight:700;margin:4px 0 10px}
    .grid{display:grid;gap:10px}
    label{display:block;font-size:.84rem;color:var(--muted);margin-bottom:5px}
    input,select{width:100%;background:var(--panel-2);color:var(--text);border:1px solid #34426f;border-radius:12px;padding:10px 12px}
    input[type="range"]{padding:0;accent-color:var(--accent);background:transparent;border:none}
    .range-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .mini{font-variant-numeric:tabular-nums;color:var(--accent);min-width:54px;text-align:right}
    .buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
    button{border:none;background:linear-gradient(180deg,#7cc7ff,#57aef1);color:#031120;padding:11px 16px;border-radius:14px;font-weight:700;cursor:pointer}
    button.secondary{background:linear-gradient(180deg,#2a365e,#202a49);color:var(--text);border:1px solid #3c4d81}
    .sim-card{padding:14px}
    .sim-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:6px 6px 12px;color:var(--muted)}
    canvas{width:100%;display:block;background:linear-gradient(180deg,#efe0b9 0%,#e6d1a3 100%);border-radius:18px;border:1px solid rgba(50,50,50,.15)}
    .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}
    .metric{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:14px}
    .metric .big{font-size:1.3rem;font-weight:800}
    .formula{margin-top:14px;padding:14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted)}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.controls{position:static}.metrics{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pulley Drop Comparison</h1>
    <div class="subtitle">Interactive model comparing the descent of masses on rotating pulleys under ideal no-slip conditions.</div><div class="layout">
  <div class="card controls">
    <div class="section-title">Global</div>
    <div class="grid">
      <div><label>g</label><input id="g" type="number" step="0.01" value="9.81"></div>
      <div><label>Drop (m)</label><input id="h" type="number" step="0.1" value="4"></div>
      <div class="range-row"><input id="speed" type="range" min="0.2" max="3" step="0.01" value="1"><div class="mini" id="speedVal">1.00×</div></div>
      <div><label>Render mode</label>
        <select id="mode">
          <option value="simple">Simple (single contact)</option>
          <option value="wrapped">Wrapped rope (multi-turn visual)</option>
        </select>
      </div>
      <div class="range-row"><label>Wrap turns (visual)</label><input id="turns" type="range" min="1" max="12" step="1" value="6"><div class="mini" id="turnsVal">6</div></div>
    </div>

    <div class="section-title">A</div>
    <div class="grid">
      <div><label>m (kg)</label><input id="mA" type="number" value="10"></div>
      <div><label>M (kg)</label><input id="MA" type="number" value="12"></div>
      <div><label>R (m)</label><input id="RA" type="number" step="0.01" value="0.22"></div>
      <div><label>Model</label><select id="shapeA"><option value="solid">solid</option><option value="ring">ring</option><option value="custom">custom</option></select></div>
      <div><label>k</label><input id="kA" type="number" step="0.01" value="0.5"></div>
    </div>

    <div class="section-title">B</div>
    <div class="grid">
      <div><label>m (kg)</label><input id="mB" type="number" value="10"></div>
      <div><label>M (kg)</label><input id="MB" type="number" value="12"></div>
      <div><label>R (m)</label><input id="RB" type="number" step="0.01" value="0.34"></div>
      <div><label>Model</label><select id="shapeB"><option value="solid">solid</option><option value="ring">ring</option><option value="custom">custom</option></select></div>
      <div><label>k</label><input id="kB" type="number" step="0.01" value="0.5"></div>
    </div>

    <div class="buttons">
      <button id="play">Play</button>
      <button id="pause" class="secondary">Pause</button>
      <button id="reset" class="secondary">Reset</button>
    </div>
  </div>

  <div class="card sim-card">
    <div class="sim-head"><div>Side-by-side animation</div><div id="status">Ready</div></div>
    <canvas id="c" width="900" height="650"></canvas>
    <div class="metrics">
      <div class="metric"><div class="big" id="acc">A: 0 · B: 0</div></div>
      <div class="metric"><div class="big" id="inertia">I_A: 0 · I_B: 0</div></div>
    </div>
    <div class="formula" id="explain"></div>
  </div>
</div>

  </div><script>
const c = document.getElementById('c'); const ctx = c.getContext('2d');
const $ = id => document.getElementById(id);
const st = {t:0,playing:false,last:null,posA:0,posB:0,velA:0,velB:0,doneA:false,doneB:false,params:null};
function num(id,d=0){const v=parseFloat($(id).value);return Number.isFinite(v)?v:d}
function I(M,R,shape,k){const kk=shape==='solid'?0.5:shape==='ring'?1:k;return kk*M*R*R}
function a(g,m,Iv,R){return g/(1+Iv/(m*R*R))}
function read(){
  const g=num('g',9.81), h=Math.max(0.1,num('h',4)), s=Math.max(0.05,num('speed',1));
  const A={m:num('mA',10),M:num('MA',12),R:num('RA',0.22),shape:$('shapeA').value,k:num('kA',.5)};
  const B={m:num('mB',10),M:num('MB',12),R:num('RB',0.34),shape:$('shapeB').value,k:num('kB',.5)};
  A.I=I(A.M,A.R,A.shape,A.k); B.I=I(B.M,B.R,B.shape,B.k);
  A.a=a(g,A.m,A.I,A.R); B.a=a(g,B.m,B.I,B.R);
  return {g,h,s,A,B,mode:$('mode').value,turns:Math.round(num('turns',6))}
}
function reset(){st.params=read();st.t=0;st.posA=st.posB=st.velA=st.velB=0;st.doneA=st.doneB=false;updateUI();draw()}
function updateUI(){const p=st.params; $('acc').textContent=`A: ${p.A.a.toFixed(3)} · B: ${p.B.a.toFixed(3)}`; $('inertia').textContent=`I_A: ${p.A.I.toFixed(3)} · I_B: ${p.B.I.toFixed(3)}`; $('explain').textContent=`a = g/(1 + I/(mR^2)). If I = kMR^2, then a = g/(1 + kM/m) (radius cancels for similar shapes).`; $('speedVal').textContent=num('speed',1).toFixed(2)+'×'; $('turnsVal').textContent=Math.round(num('turns',6))}
function step(dt){const p=st.params; st.t+=dt; const h=p.h;
  if(!st.doneA){st.velA+=p.A.a*dt; st.posA+=st.velA*dt; if(st.posA>=h){st.posA=h; st.doneA=true}}
  if(!st.doneB){st.velB+=p.B.a*dt; st.posB+=st.velB*dt; if(st.posB>=h){st.posB=h; st.doneB=true}}
  $('status').textContent=st.doneA&&st.doneB?'Finished':`t=${st.t.toFixed(2)}s`;
}
function drawWrapped(cx,top,side,label,pos,vel){
  const p=st.params; const maxR=Math.max(p.A.R,p.B.R); const r=26+42*(side.R/maxR);
  const pxPerM=70, dropMax=Math.min(300,p.h*pxPerM); const drop=(p.h>0?pos/p.h:0)*dropMax;
  const axleY=top, beamY=top-46, bagY=axleY+34+drop; const ang=-(pos/Math.max(side.R,1e-6));
  ctx.save(); ctx.translate(cx,0);
  ctx.strokeStyle='#7d6644'; ctx.lineWidth=12; ctx.beginPath(); ctx.moveTo(-120,beamY); ctx.lineTo(120,beamY); ctx.stroke();
  ctx.strokeStyle='#65492d'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(-70,beamY); ctx.lineTo(-70,axleY-r-6); ctx.moveTo(70,beamY); ctx.lineTo(70,axleY-r-6); ctx.stroke();
  ctx.save(); ctx.translate(0,axleY); ctx.rotate(ang);
  ctx.fillStyle='#5c4631'; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  // helical-looking wraps (stacked arcs with phase)
  const turns=p.turns; const layers=Math.max(3,Math.min(10,turns));
  ctx.strokeStyle='#f08d22'; ctx.lineWidth=8; ctx.lineCap='round';
  for(let i=0;i<layers;i++){
    const t=i/(layers-1); const rr=r-8 - t*10; const phase=i*0.4;
    ctx.beginPath(); ctx.arc(0,0,rr,-2.2+phase,-1.0+phase); ctx.stroke();
  }
  ctx.restore();
  // rope exit
  ctx.strokeStyle='#f08d22'; ctx.lineWidth=8; ctx.beginPath(); ctx.moveTo(0,axleY+r-4); ctx.lineTo(0,bagY-38); ctx.stroke();
  // bag
  ctx.save(); ctx.translate(0,bagY); ctx.fillStyle='#3b2b1d'; ctx.beginPath(); ctx.moveTo(0,50); ctx.bezierCurveTo(44,40,44,-30,10,-48); ctx.lineTo(-10,-48); ctx.bezierCurveTo(-44,-30,-44,40,0,50); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 26px Inter'; ctx.textAlign='center'; ctx.fillText(`${side.m.toFixed(0)} kg`,0,12); ctx.restore();
  ctx.fillStyle='#111'; ctx.font='bold 40px Inter'; ctx.fillText(label,-70,bagY-10);
  ctx.restore();
}
function drawSimple(cx,top,side,label,pos,vel){
  const p=st.params; const maxR=Math.max(p.A.R,p.B.R); const r=26+42*(side.R/maxR);
  const pxPerM=70, dropMax=Math.min(300,p.h*pxPerM); const drop=(p.h>0?pos/p.h:0)*dropMax;
  const axleY=top, beamY=top-46, bagY=axleY+34+drop; const ang=-(pos/Math.max(side.R,1e-6));
  ctx.save(); ctx.translate(cx,0);
  ctx.strokeStyle='#7d6644'; ctx.lineWidth=12; ctx.beginPath(); ctx.moveTo(-120,beamY); ctx.lineTo(120,beamY); ctx.stroke();
  ctx.strokeStyle='#65492d'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(-70,beamY); ctx.lineTo(-70,axleY-r-6); ctx.moveTo(70,beamY); ctx.lineTo(70,axleY-r-6); ctx.stroke();
  ctx.save(); ctx.translate(0,axleY); ctx.rotate(ang); ctx.fillStyle='#5c4631'; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.strokeStyle='#f08d22'; ctx.lineWidth=8; ctx.beginPath(); ctx.moveTo(0,axleY+r-4); ctx.lineTo(0,bagY-38); ctx.stroke();
  ctx.save(); ctx.translate(0,bagY); ctx.fillStyle='#3b2b1d'; ctx.beginPath(); ctx.moveTo(0,50); ctx.bezierCurveTo(44,40,44,-30,10,-48); ctx.lineTo(-10,-48); ctx.bezierCurveTo(-44,-30,-44,40,0,50); ctx.fill(); ctx.fillStyle='#fff'; ctx.font='bold 26px Inter'; ctx.textAlign='center'; ctx.fillText(`${side.m.toFixed(0)} kg`,0,12); ctx.restore();
  ctx.fillStyle='#111'; ctx.font='bold 40px Inter'; ctx.fillText(label,-70,bagY-10);
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  const p=st.params; if(!p) return;
  const mode=p.mode;
  const drawSys = mode==='wrapped'?drawWrapped:drawSimple;
  drawSys(240,170,p.A,'A',st.posA,st.velA);
  drawSys(660,170,p.B,'B',st.posB,st.velB);
}
function frame(ts){ if(st.last==null) st.last=ts; const dt=((ts-st.last)/1000)*(st.params?.s||1); st.last=ts; if(st.playing) step(Math.min(dt,0.05)); draw(); requestAnimationFrame(frame)}
$('play').onclick=()=>{st.params=read(); updateUI(); st.playing=true; $('status').textContent='Running'};
$('pause').onclick=()=>{st.playing=false; $('status').textContent='Paused'};
$('reset').onclick=()=>{st.playing=false; reset(); $('status').textContent='Ready'};
['g','h','speed','mode','turns','mA','MA','RA','shapeA','kA','mB','MB','RB','shapeB','kB'].forEach(id=>$(id).addEventListener('input',()=>{const was=st.playing; st.playing=false; reset(); st.playing=was;}));
$('speedVal').textContent=num('speed',1).toFixed(2)+'×'; $('turnsVal').textContent=Math.round(num('turns',6));
reset(); requestAnimationFrame(frame);
</script></body>
</html>
